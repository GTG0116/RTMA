name: Update RTMA Data

on:

  repository_dispatch:
    types: [RTMA_update] # This is the event type cron-job.org will send
  workflow_dispatch:      # Keeps the manual trigger from GitHub UI
  # schedule:
  #   - cron: '0 * * * *'  # Commented out so it relies purely on cron-job.org

permissions:
  contents: write  # Needed to commit updated images back to the repo








jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Mamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-name: geo-env
          create-args: >-
            python=3.9
            xarray
            cfgrib
            matplotlib
            scipy
            boto3
            eccodes
            numpy

      - name: Run Script
        shell: bash -l {0}
        run: |
          export ECCODES_DEFINITION_PATH=$CONDA_PREFIX/share/eccodes/definitions
          python process_rtma.py

      # Debugging: List files to ensure they exist before we try to deploy
      - name: Verify Output
        run: |
          echo "Checking site/data folder..."
          ls -R site/

      - name: Commit frames to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/
          git diff --staged --quiet || git commit -m "chore: update RTMA frames"
          git push origin main

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
